<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sorting Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="title">Sorting Visualizer</h1>

<div class="controls">
    <button class="btn random" onclick="generateRandom()">Generate Random</button>

    <input type="text" id="arrayInput" placeholder="Enter array e.g. 22,41,6,71">

    <button class="btn use" onclick="useCustomArray()">Use Array</button>
</div>

<div class="sort-buttons">
    <button class="btn bubble" onclick="bubbleSort()">Bubble Sort</button>
    <button class="btn selection" onclick="selectionSort()">Selection Sort</button>
    <button class="btn insertion" onclick="insertionSort()">Insertion Sort</button>
    <button class="btn merge" onclick="mergeSortStart()">Merge Sort</button>
    <button class="btn quick" onclick="quickSortStart()">Quick Sort</button>
</div>

<h3 id="algoName">Algorithm: None</h3>

<div id="arrayContainer"></div>

<div id="celebration"> Sorting Completed </div>

<script src="script.js"></script>
</body>
</html>
